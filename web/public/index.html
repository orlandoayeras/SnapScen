<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapScen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }

    .version {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .config-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      gap: 12px;
    }

    .config-item:last-child { border-bottom: none; }
    .config-label { color: var(--muted); flex-shrink: 0; }

    .config-value {
      color: var(--text);
      text-align: right;
      word-break: break-all;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem;
    }

    .commands-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .btn:hover { border-color: var(--accent); background: #1e2040; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn .btn-label { font-weight: 600; }
    .btn .btn-desc { font-size: 0.75rem; color: var(--muted); }

    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.15s;
      margin-top: 16px;
      width: 100%;
      text-align: center;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text); }

    .btn-report {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      text-align: center;
      transition: all 0.15s;
    }

    .btn-report:hover { color: var(--text); border-color: var(--text); }

    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .status { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status-dot.running { background: var(--warning); animation: pulse 1s infinite; }
    .status-dot.success { background: var(--success); }
    .status-dot.error   { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .btn-clear:hover { color: var(--text); background: var(--border); }

    .output-console {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      padding: 16px 20px;
      height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #94a3b8;
    }

    .line-success { color: var(--success); }
    .line-error   { color: var(--danger); }
    .line-info    { color: var(--accent); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }

    .modal-header h2 { font-size: 1rem; font-weight: 600; }

    .btn-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
    }

    .btn-close:hover { color: var(--text); }

    .modal-tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .modal-tab {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 8px 14px;
      border-radius: 8px 8px 0 0;
      transition: all 0.15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .modal-tab:hover { color: var(--text); }
    .modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex: 1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      padding: 9px 12px;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .form-input:focus { outline: none; border-color: var(--accent); }

    .viewport-row, .page-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .page-row .form-input.path      { flex: 1.2; }
    .page-row .form-input.label     { flex: 1.5; }
    .page-row .form-input.threshold { width: 90px; flex-shrink: 0; }

    .viewport-row .form-input.vp-label { flex: 1.5; }
    .viewport-row .form-input.vp-dim   { width: 90px; flex-shrink: 0; }

    .btn-remove {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 6px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .btn-remove:hover { color: var(--danger); border-color: var(--danger); }

    .btn-add {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 8px 14px;
      border-radius: 8px;
      width: 100%;
      text-align: center;
      margin-top: 4px;
      transition: all 0.15s;
    }

    .btn-add:hover { color: var(--text); border-color: var(--accent); }

    .row-header {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      padding-right: 40px;
    }

    .row-header span {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.875rem;
      padding: 9px 18px;
      border-radius: 8px;
      transition: all 0.15s;
    }

    .btn-cancel:hover { color: var(--text); border-color: var(--text); }

    .btn-save {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: white;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 8px;
      transition: all 0.15s;
    }

    .btn-save:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <header>
    <h1>Snap<span>Scen</span></h1>
    <span class="version">v1.0.0</span>
  </header>

  <div class="grid">
    <div class="card">
      <div class="card-title">Config</div>
      <div id="config-content">Loading...</div>
      <button class="btn-ghost" onclick="openModal()">Edit Config</button>
    </div>

    <div class="card">
      <div class="card-title">Commands</div>
      <div class="commands-grid">
        <button class="btn" onclick="runCommand('reference')">
          <span class="btn-label">Reference</span>
          <span class="btn-desc">Capture baseline screenshots</span>
        </button>
        <button class="btn" onclick="runCommand('test')">
          <span class="btn-label">Test</span>
          <span class="btn-desc">Compare against reference</span>
        </button>
        <button class="btn btn-primary" onclick="runCommand('vrt')">
          <span class="btn-label">VRT</span>
          <span class="btn-desc">Reference + test in one step</span>
        </button>
        <button class="btn" onclick="runCommand('approve')">
          <span class="btn-label">Approve</span>
          <span class="btn-desc">Accept intentional changes</span>
        </button>
      </div>
      <button class="btn-report" onclick="window.open('/report', '_blank')">
        View Report →
      </button>
    </div>
  </div>

  <div class="output-card">
    <div class="output-header">
      <div class="status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Ready</span>
      </div>
      <button class="btn-clear" onclick="clearOutput()">Clear</button>
    </div>
    <div class="output-console" id="output"></div>
  </div>

  <!-- Edit Config Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Config</h2>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="settings" onclick="switchTab('settings')">Settings</button>
        <button class="modal-tab" data-tab="pages" onclick="switchTab('pages')">Pages</button>
      </div>
      <div class="modal-body">
        <div id="tab-settings"></div>
        <div id="tab-pages" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveConfig()">Save Config</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
