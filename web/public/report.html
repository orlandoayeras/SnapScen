<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapScen — Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--text); }

    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }

    .run-meta {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'SF Mono', monospace;
    }

    /* Stats */
    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 100px;
    }

    .stat-pill-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
    }

    .stat-pill-value {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-pill-value.pass { color: var(--success); }
    .stat-pill-value.fail { color: var(--danger); }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 20px;
      transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--text); border-color: var(--text); }
    .filter-btn.active      { background: var(--accent);  border-color: var(--accent);  color: white; }
    .filter-btn.active-pass { background: var(--success); border-color: var(--success); color: white; }
    .filter-btn.active-fail { background: var(--danger);  border-color: var(--danger);  color: white; }

    /* Page sections */
    .page-section { margin-bottom: 32px; }

    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .page-header h2 { font-size: 1rem; font-weight: 600; }

    .page-url {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'SF Mono', monospace;
    }

    .page-badge {
      margin-left: auto;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }

    .page-badge.all-pass { background: rgba(34,197,94,0.15); color: var(--success); }
    .page-badge.has-fail { background: rgba(239,68,68,0.15);  color: var(--danger);  }

    /* Scenario cards */
    .viewport-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    .scenario-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .scenario-card.fail { border-color: rgba(239,68,68,0.4); }
    .scenario-card.pass { border-color: rgba(34,197,94,0.2); }

    .scenario-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .viewport-tag {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--muted);
    }

    .status-badge {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .status-badge.pass { background: rgba(34,197,94,0.15); color: var(--success); }
    .status-badge.fail { background: rgba(239,68,68,0.15);  color: var(--danger);  }

    .mismatch-pct {
      margin-left: auto;
      font-size: 0.8rem;
      font-family: 'SF Mono', monospace;
      color: var(--muted);
    }

    .mismatch-pct.over { color: var(--danger); }

    /* Image grid */
    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    .image-pane {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .pane-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 6px 8px 4px;
      font-weight: 600;
    }

    .pane-img {
      width: 100%;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.15s;
      max-height: 160px;
      object-fit: cover;
      object-position: top;
    }

    .pane-img:hover { opacity: 0.85; }

    .pane-missing {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80px;
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Error card */
    .error-body { padding: 14px; }

    .error-msg {
      font-size: 0.75rem;
      color: var(--danger);
      font-family: 'SF Mono', monospace;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 80px;
      overflow-y: auto;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .empty-state p { margin-top: 8px; font-size: 0.875rem; }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 24px;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a class="back-link" href="/">← Dashboard</a>
      <h1>Snap<span>Scen</span></h1>
    </div>
    <span class="run-meta" id="run-meta">Loading...</span>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all"  onclick="setFilter('all')">All</button>
    <button class="filter-btn"        data-filter="pass" onclick="setFilter('pass')">Passed</button>
    <button class="filter-btn"        data-filter="fail" onclick="setFilter('fail')">Failed</button>
  </div>

  <div id="report-content"></div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script src="report.js"></script>
</body>
</html>
